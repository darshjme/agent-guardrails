<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <style>
      .bg{fill:#0d1117}.title{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;fill:#e6edf3}
      .subtitle{font-family:'JetBrains Mono',monospace;font-size:13px;fill:#8b949e}
      .tag{font-family:monospace;font-size:9px;fill:#cc9933}
      .blocked{fill:#3d1a1a;stroke:#f85149;stroke-width:1.5}
      .passed{fill:#1a3320;stroke:#238636;stroke-width:1.5}
      @keyframes flash{0%,100%{opacity:1}50%{opacity:0.3}}
      .flash{animation:flash 0.8s step-end infinite}
    </style>
  </defs>
  <rect width="800" height="300" class="bg"/>
  <text x="40" y="50" class="title">agent-guardrails</text>
  <text x="40" y="72" class="subtitle">Validate LLM output before it reaches users</text>
  <text x="40" y="90" class="tag">Schema · Content safety · Length · Retry</text>

  <!-- Input -->
  <rect x="40" y="120" width="120" height="50" rx="8" fill="#1f2d3d" stroke="#1f6feb" stroke-width="2"/>
  <text x="100" y="142" font-family="monospace" font-size="10" fill="#58a6ff" text-anchor="middle">LLM Output</text>
  <text x="100" y="158" font-family="monospace" font-size="8" fill="#8b949e" text-anchor="middle">raw · untrusted</text>

  <!-- Pipeline stages -->
  <rect x="200" y="110" width="90" height="70" rx="8" fill="#161b22" stroke="#8957e5" stroke-width="1.5"/>
  <text x="245" y="135" font-family="monospace" font-size="9" fill="#d2a8ff" text-anchor="middle">Schema</text>
  <text x="245" y="150" font-family="monospace" font-size="9" fill="#d2a8ff" text-anchor="middle">Guard</text>
  <text x="245" y="168" font-family="monospace" font-size="8" fill="#8b949e" text-anchor="middle">Pydantic</text>

  <rect x="310" y="110" width="90" height="70" rx="8" fill="#161b22" stroke="#cc9933" stroke-width="1.5"/>
  <text x="355" y="135" font-family="monospace" font-size="9" fill="#cc9933" text-anchor="middle">Content</text>
  <text x="355" y="150" font-family="monospace" font-size="9" fill="#cc9933" text-anchor="middle">Guard</text>
  <text x="355" y="168" font-family="monospace" font-size="8" fill="#8b949e" text-anchor="middle">PII · toxicity</text>

  <rect x="420" y="110" width="90" height="70" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="465" y="135" font-family="monospace" font-size="9" fill="#58a6ff" text-anchor="middle">Length</text>
  <text x="465" y="150" font-family="monospace" font-size="9" fill="#58a6ff" text-anchor="middle">Guard</text>
  <text x="465" y="168" font-family="monospace" font-size="8" fill="#8b949e" text-anchor="middle">min · max chars</text>

  <!-- Arrows -->
  <line x1="162" y1="145" x2="196" y2="145" stroke="#30363d" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="292" y1="145" x2="306" y2="145" stroke="#30363d" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="402" y1="145" x2="416" y2="145" stroke="#30363d" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="512" y1="145" x2="556" y2="145" stroke="#238636" stroke-width="2" marker-end="url(#ag)"/>
  <defs>
    <marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#30363d"/></marker>
    <marker id="ag" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#238636"/></marker>
  </defs>

  <!-- Blocked path (down) -->
  <line x1="355" y1="182" x2="355" y2="220" stroke="#f85149" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <defs><marker id="ar" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#f85149"/></marker></defs>
  <rect x="295" y="222" width="120" height="30" rx="6" class="blocked flash"/>
  <text x="355" y="241" font-family="monospace" font-size="9" fill="#f85149" text-anchor="middle">🚫 ContentGuardError</text>

  <!-- Safe output -->
  <rect x="558" y="120" width="120" height="50" rx="8" class="passed"/>
  <text x="618" y="142" font-family="monospace" font-size="10" fill="#3fb950" text-anchor="middle">✓ Safe Output</text>
  <text x="618" y="158" font-family="monospace" font-size="8" fill="#8b949e" text-anchor="middle">validated · typed</text>

  <!-- Retry arrow -->
  <path d="M 465 182 Q 465 260 320 260 Q 175 260 175 145" stroke="#f78166" stroke-width="1" stroke-dasharray="3 3" fill="none" marker-end="url(#aret)"/>
  <defs><marker id="aret" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#f78166"/></marker></defs>
  <text x="370" y="275" font-family="monospace" font-size="8" fill="#f78166" text-anchor="middle">RetryGuard — refined prompt</text>
</svg>
